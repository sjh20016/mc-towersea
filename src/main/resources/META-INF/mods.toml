modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/towersea/towersea/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
updateJSONURL="https://github.com/towersea/towersea/update.json"
displayURL="https://github.com/towersea/towersea"
logoFile="logo.png"
credits="TowerSea Team"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.towersea]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.towersea]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
